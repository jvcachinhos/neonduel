<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Duel: Ultimate Custom</title>
    <style>
        :root {
            --bg: #050505;
            --p1-color: #3498db;
            --p2-color: #e74c3c;
            --target-color: #2ecc71;
            --gold: #f1c40f;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a5276 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #922b21 0%, transparent 40%);
            opacity: 0.4;
            z-index: -1;
            filter: blur(60px);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg { from { transform: scale(1); } to { transform: scale(1.2); } }

        #menuOverlay, #rankingOverlay {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }

        #rankingOverlay { display: none; z-index: 150; }

        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        h1 { 
            margin: 0; font-size: 26px; letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .credits {
            font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.4);
            text-transform: uppercase; margin-bottom: 25px; display: block;
        }

        .config-label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        .config-row { margin-bottom: 15px; }
        .options { display: flex; gap: 6px; }

        .btn-opt {
            flex: 1; padding: 10px 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #888; border-radius: 8px; font-size: 9px;
        }

        .btn-opt.active { background: #fff; color: #000; font-weight: bold; border-color: #fff; }

        .btn-start {
            margin-top: 10px; padding: 16px; width: 100%; border: none; border-radius: 12px;
            background: #fff; color: #000; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase;
        }

        #gameHUD { 
            position: absolute; top: 10px; display: none; align-items: center; gap: 15px; z-index: 50; 
            background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
        }

        canvas { display: none; touch-action: none; }
        
        #winScreen { 
            display: none; position: absolute; width: 100%; height: 100%; 
            justify-content: center; align-items: center; flex-direction: column; z-index: 200; background: #000;
        }
    </style>
</head>
<body>

    <div id="bg-animation"></div>

    <div id="menuOverlay">
        <div class="menu-card">
            <h1>Neon Duel</h1>
            <span class="credits">Feito por Cachinhos</span>
            
            <div id="modeSection">
                <button class="btn-start" style="margin-bottom: 10px;" onclick="selectMode('cpu')">VS CPU</button>
                <button class="btn-start" style="margin-bottom: 10px;" onclick="selectMode('pvp')">2 JOGADORES</button>
                <button class="btn-start" style="background: var(--target-color);" onclick="selectMode('target')">🎯 MODO ALVO</button>
                <button class="btn-opt" style="width: 100%; margin-top: 10px;" onclick="showRanking()">🏆 RANKING</button>
            </div>

            <div id="configSection">
                <div class="config-row" id="cpuDifficultyRow">
                    <span class="config-label">Dificuldade</span>
                    <div class="options">
                        <button class="btn-opt" onclick="setCfg('cpuSkill', 3, this)">Fácil</button>
                        <button class="btn-opt active" onclick="setCfg('cpuSkill', 6, this)">Médio</button>
                        <button class="btn-opt" onclick="setCfg('cpuSkill', 10, this)">Impossível</button>
                    </div>
                </div>
                <div class="config-row">
                    <span class="config-label">Velocidade da Bola</span>
                    <div class="options">
                        <button class="btn-opt" onclick="setCfg('speed', 3, this)">Lenta</button>
                        <button class="btn-opt active" onclick="setCfg('speed', 5, this)">Normal</button>
                        <button class="btn-opt" onclick="setCfg('speed', 8, this)">Rápida</button>
                    </div>
                </div>
                <button class="btn-start" onclick="startGame()">COMEÇAR</button>
                <p style="font-size: 10px; color: #555; margin-top: 15px;" onclick="location.reload()">VOLTAR</p>
            </div>
        </div>
    </div>

    <div id="gameHUD">
        <div id="scoreDisplay" style="font-weight: 800; letter-spacing: 2px;">
            <span id="p1Score" style="color: var(--p1-color)">0</span> - <span id="p2Score" style="color: var(--p2-color)">0</span>
        </div>
        <button onclick="togglePause()" style="background:none; border:none; color:#fff; font-size:10px;">PAUSAR</button>
    </div>

    <canvas id="pongCanvas"></canvas>

    <div id="winScreen">
        <h1 id="winnerText"></h1>
        <button class="btn-start" style="width: auto; padding: 15px 40px;" onclick="location.reload()">SAIR</button>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        let gameRunning = false, isPaused = false, gameMode = 'pvp';
        let scoreP1 = 0, scoreP2 = 0;
        let cfg = { speed: 5, paddle: 80, ball: 8, cpuSkill: 6 };
        let p1Y, p2Y, ballX, ballY, ballSpeedX, ballSpeedY;
        let target = { x: 0, y: 0, active: false };

        // Ajuste automático para o tamanho da tela do celular
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            p1Y = canvas.height/2 - cfg.paddle/2;
            p2Y = canvas.height/2 - cfg.paddle/2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Controles de Toque
        window.addEventListener("touchmove", (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const y = (touch.clientY - rect.top);
            
            // Lado esquerdo (P1)
            if (touch.clientX < window.innerWidth / 2) {
                p1Y = y - cfg.paddle / 2;
            } 
            // Lado direito (P2 no modo PVP)
            else if (gameMode === 'pvp') {
                p2Y = y - cfg.paddle / 2;
            }
        }, { passive: false });

        function selectMode(mode) {
            gameMode = mode;
            document.getElementById('modeSection').style.display = 'none';
            document.getElementById('configSection').style.display = 'block';
            if(mode !== 'cpu') document.getElementById('cpuDifficultyRow').style.display = 'none';
        }

        function setCfg(t, v, b) {
            cfg[t] = v;
            Array.from(b.parentElement.children).forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function startGame() {
            document.getElementById('menuOverlay').style.display = 'none';
            document.getElementById('gameHUD').style.display = 'flex';
            canvas.style.display = 'block';
            resetBall();
            gameRunning = true;
            if(gameMode === 'target') spawnTarget();
            requestAnimationFrame(loop);
        }

        function resetBall() {
            ballX = canvas.width/2;
            ballY = canvas.height/2;
            ballSpeedX = cfg.speed * (Math.random() > 0.5 ? 1 : -1);
            ballSpeedY = (Math.random() - 0.5) * cfg.speed;
        }

        function spawnTarget() {
            target.x = canvas.width * 0.8;
            target.y = Math.random() * (canvas.height - 50) + 25;
            target.active = true;
        }

        function update() {
            if (!gameRunning || isPaused) return;

            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Colisão Teto/Chão
            if (ballY <= 0 || ballY >= canvas.height) ballSpeedY *= -1;

            // IA do CPU
            if (gameMode === 'cpu') {
                let center = p2Y + cfg.paddle/2;
                if (ballX > canvas.width/2) {
                    if (center < ballY - 10) p2Y += cfg.cpuSkill;
                    else if (center > ballY + 10) p2Y -= cfg.cpuSkill;
                }
            }

            // Colisões Raquetes
            const paddleW = 15;
            if (ballX <= paddleW && ballY > p1Y && ballY < p1Y + cfg.paddle) {
                ballSpeedX = Math.abs(ballSpeedX) * 1.05;
                ballSpeedY = (ballY - (p1Y + cfg.paddle/2)) * 0.2;
            }
            if (gameMode !== 'target' && ballX >= canvas.width - paddleW && ballY > p2Y && ballY < p2Y + cfg.paddle) {
                ballSpeedX = -Math.abs(ballSpeedX) * 1.05;
                ballSpeedY = (ballY - (p2Y + cfg.paddle/2)) * 0.2;
            }

            // Modo Alvo
            if (gameMode === 'target') {
                if (ballX >= canvas.width) ballSpeedX *= -1;
                let dist = Math.hypot(ballX - target.x, ballY - target.y);
                if (dist < 30) {
                    scoreP1++;
                    spawnTarget();
                    ballSpeedX *= 1.02;
                }
            }

            // Pontuação
            if (ballX < 0) {
                if(gameMode === 'target') endGame("FIM DE JOGO");
                else { scoreP2++; resetBall(); }
            } else if (ballX > canvas.width && gameMode !== 'target') {
                scoreP1++; resetBall();
            }

            document.getElementById('p1Score').innerText = scoreP1;
            document.getElementById('p2Score').innerText = scoreP2;
            
            if (scoreP1 >= 5 || scoreP2 >= 5) endGame(scoreP1 >= 5 ? "JOGADOR 1 VENCEU" : "CPU VENCEU");
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linha central
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.setLineDash([10, 10]);
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            ctx.setLineDash([]);

            // Alvo
            if(gameMode === 'target' && target.active) {
                ctx.fillStyle = varColor('--target-color');
                ctx.beginPath(); ctx.arc(target.x, target.y, 15, 0, Math.PI*2); ctx.fill();
            }

            // Raquetes
            ctx.fillStyle = varColor('--p1-color');
            ctx.fillRect(0, p1Y, 15, cfg.paddle);
            if(gameMode !== 'target') {
                ctx.fillStyle = varColor('--p2-color');
                ctx.fillRect(canvas.width - 15, p2Y, 15, cfg.paddle);
            }

            // Bola
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(ballX, ballY, cfg.ball, 0, Math.PI*2); ctx.fill();
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
        function togglePause() { isPaused = !isPaused; }
        function endGame(txt) {
            gameRunning = false;
            document.getElementById('winScreen').style.display = 'flex';
            document.getElementById('winnerText').innerText = txt;
        }

        function loop() { update(); draw(); if (gameRunning) requestAnimationFrame(loop); }
        function showRanking() { alert("Em breve: Ranking Online!"); }
    </script>
</body>
</html>
