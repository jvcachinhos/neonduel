<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <!-- 🔥 MOBILE OTIMIZADO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Neon Duel Mobile</title>

    <style>
        :root {
            --bg: #050505;
            --p1-color: #3498db;
            --p2-color: #e74c3c;
            --target-color: #2ecc71;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            background: var(--bg);
            font-family: sans-serif;
        }

        #menuOverlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        button {
            padding: 15px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
        }

        canvas {
            display: none;
        }

        #hud {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            display: none;
        }

        #win {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div id="menuOverlay">
    <h1>Neon Duel</h1>
    <button onclick="start('cpu')">VS CPU</button>
    <button onclick="start('pvp')">2 Jogadores</button>
    <button onclick="start('target')">Modo Alvo 🎯</button>
</div>

<div id="hud">
    <span id="score">0 - 0</span>
</div>

<canvas id="game"></canvas>

<div id="win">
    <h1 id="winner"></h1>
    <button onclick="location.reload()">Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode;
let p1Y, p2Y, ballX, ballY, vx, vy;
let score1 = 0, score2 = 0;
let running = false;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function start(m){
    mode = m;
    document.getElementById("menuOverlay").style.display = "none";
    document.getElementById("hud").style.display = "block";
    canvas.style.display = "block";

    p1Y = canvas.height/2 - 50;
    p2Y = p1Y;
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    vx = 5 * (Math.random() > 0.5 ? 1 : -1);
    vy = (Math.random() - 0.5) * 5;

    running = true;
    loop();
}

// 🎮 CONTROLE TOUCH (CORRIGIDO)
window.addEventListener("touchmove", (e)=>{
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();

    const y = (touch.clientY - rect.top) * (canvas.height / rect.height);

    if(touch.clientX < window.innerWidth/2){
        p1Y = y - 50;
    } else if(mode === "pvp"){
        p2Y = y - 50;
    }
}, { passive:false });

function update(){
    if(!running) return;

    ballX += vx;
    ballY += vy;

    if(ballY < 0 || ballY > canvas.height) vy *= -1;

    // CPU
    if(mode === "cpu"){
        let center = p2Y + 50;
        if(center < ballY) p2Y += 4;
        else p2Y -= 4;
    }

    // colisão
    if(ballX < 20 && ballY > p1Y && ballY < p1Y+100){
        vx = Math.abs(vx);
    }

    if(mode !== "target" && ballX > canvas.width-20 && ballY > p2Y && ballY < p2Y+100){
        vx = -Math.abs(vx);
    }

    // ponto
    if(ballX < 0){
        if(mode === "target") end("Fim de jogo");
        else score2++, reset();
    }
    if(ballX > canvas.width){
        if(mode !== "target") score1++, reset();
    }

    document.getElementById("score").innerText = score1 + " - " + score2;

    if(score1 >= 5) end("Jogador 1 venceu");
    if(score2 >= 5) end("Jogador 2 venceu");
}

function reset(){
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    vx *= -1;
}

function draw(){
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, p1Y, 15, 100);

    if(mode !== "target"){
        ctx.fillRect(canvas.width-15, p2Y, 15, 100);
    }

    ctx.beginPath();
    ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
    ctx.fill();
}

function loop(){
    update();
    draw();
    if(running) requestAnimationFrame(loop);
}

function end(txt){
    running = false;
    document.getElementById("win").style.display = "flex";
    document.getElementById("winner").innerText = txt;
}
</script>

</body>
</html>
